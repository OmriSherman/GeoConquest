<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
</head>
<body>
  <div id="map" style="width: 500px; height: 500px;"></div>
  <script>
    var map = L.map('map').setView([0,0], 2);
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
      .then(r => r.json())
      .then(topology => {
        var geojson = topojson.feature(topology, topology.objects.countries);
        var targetFeature = geojson.features.find(f => String(f.id) === "466"); // Mali
        
        console.log("Found:", targetFeature);
        var layer = L.geoJSON(targetFeature).addTo(map);
        map.fitBounds(layer.getBounds().pad(0.15));
        console.log("Success with bounds", layer.getBounds());
      });
  </script>
</body>
</html>
